  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [{
      "@type": "Question",
      "name": "What does Aaghaz Foundation actually do?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Aaghaz Foundation is a non-profit organisation supporting meritorious students from economically weak backgrounds across India. We run scholarships, need-based financial assistance, the Rahmani 30 coaching tie-up in Uttar Pradesh, and the Lucknow Coaching & Guidance Centre (LCGC). We were founded in 2004 by journalist Mazhar Farooqui and his friends in Lucknow with just Rs 2,000 and one needy student."
      }
    },{
      "@type": "Question",
      "name": "How do you decide who gets a scholarship?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Every student is recommended to us, then verified through an in-person pre-scholarship survey by at least two volunteers. Only after both surveys agree do we onboard the student. This process keeps us honest and protects donors' trust."
      }
    },{
      "@type": "Question",
      "name": "Are donations to Aaghaz Foundation tax-exempt?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Aaghaz Foundation is a registered non-profit and donations made by Indian residents are eligible for tax exemption under Section 80G of the Income Tax Act. Receipts are issued within seven working days of every donation."
      }
    },{
      "@type": "Question",
      "name": "How can I become a volunteer?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Aaghaz is a volunteer-driven organisation. Use our Become a Volunteer page to register your interest and a team member will reach out within a few working days to walk you through orientation."
      }
    }]
  }
